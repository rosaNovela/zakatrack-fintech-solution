server:
  port: 8081

spring:
  application:
    name: zakatrack-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/zakatrack_db
    username: rosa_dev
    password: password123
    driver-class-name: org.postgresql.Driver

    # HikariCP Connection Pooling (Optimizes database performance)
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      # 'update' automatically creates your 'expenses' table when the app starts
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# Exposes the 'prometheus' metrics for Step 6 of your project requirements
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always